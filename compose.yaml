services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webshaped-blog-astro
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
