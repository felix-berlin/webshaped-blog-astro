services:
  proxy:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: webshaped-blog-astro-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-80}:80"
    # Optional: Uncomment volumes below to override nginx configs locally during development
    # volumes:
    #   - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    #   - ./nginx/conf.d/webshaped.conf:/etc/nginx/conf.d/webshaped.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webshaped-blog-astro
    expose:
      - "4321"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
