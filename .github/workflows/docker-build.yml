name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
      - beta
  # - "**"
  # pull_request:
  # The trigger on release and prerelease does not work, so i use push tags instead
  # release:
  #   types: [published] # Ensure the workflow runs only when a release is published

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker meta (app)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Verify app Dockerfile exists
        run: |
          if [[ ! -f "Dockerfile" ]]; then
            echo "ERROR: Dockerfile not found! This would result in the wrong Dockerfile being used." >&2
            exit 1
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build env secret
        id: build_env
        env:
          PROD_SECRETS: ${{ secrets.PROD_SECRETS }}
          DEV_SECRETS: ${{ secrets.DEV_SECRETS }}
        run: |
          set -e
          case "${GITHUB_REF}" in
            refs/heads/main|refs/tags/v*)
              BUILD_ENV="${PROD_SECRETS}"
              ;;
            *)
              BUILD_ENV="${DEV_SECRETS}"
              ;;
          esac

          if [[ -z "${BUILD_ENV}" ]]; then
            echo "Selected build secret is empty" >&2
            exit 1
          fi

          printf '%s' "${BUILD_ENV}" > .build.env

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          secret-files: |
            build_env=.build.env
          cache-from: |
            type=gha,scope=app
          cache-to: |
            type=gha,mode=max,scope=app

      - name: Cleanup build env secret
        if: always()
        run: rm -f .build.env

  build-proxy:
    needs: build-app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker meta (proxy)
        id: meta_proxy
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-proxy
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Verify proxy Dockerfile exists
        run: |
          if [[ ! -f "docker/nginx.Dockerfile" ]]; then
            echo "ERROR: docker/nginx.Dockerfile not found! This would result in the wrong Dockerfile being used." >&2
            exit 1
          fi

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push proxy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/nginx.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_proxy.outputs.tags }}
          labels: ${{ steps.meta_proxy.outputs.labels }}
          cache-from: |
            type=gha,scope=proxy
          cache-to: |
            type=gha,mode=max,scope=proxy
