worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/rss+xml
        application/xml
        image/svg+xml;

    brotli on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/rss+xml
        application/xml
        image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
