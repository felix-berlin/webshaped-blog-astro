map $http_x_forwarded_proto $redirect_scheme {
    default $scheme;
    https   https;
}

map $host $canonical_host {
    default         "";
    www.webshaped.de webshaped.de;
}

map $request_uri $legacy_post_slug {
    default "";

    ~^/automatische-matomo-backups(/|$)                                              automatische-matomo-backups;
    ~^/matomo-tracking-script-optimal-einbinden(/|$)                                 matomo-tracking-script-optimal-einbinden;
    ~^/gutenberg-standard-vollbildmodus-deaktivieren-wordpress-5-4(/|$)              gutenberg-standard-vollbildmodus-deaktivieren-wordpress-5-4;
    ~^/wordpress-comment-form-validation-interaktiv-mit-javascript(/|$)              wordpress-comment-form-validation-interaktiv-mit-javascript;
    ~^/code-dokumentieren-leicht-gemacht-vs-code-extension-guide(/|$)                code-dokumentieren-leicht-gemacht-vs-code-extension-guide;
    ~^/datenschutz-checkbox-fuer-wordpress-kommentare-ohne-plugin(/|$)               datenschutz-checkbox-fuer-wordpress-kommentare-ohne-plugin;
    ~^/stockfoto-sammlung(/|$)                                                       stockfoto-sammlung;
}

server {
    listen 80;
    server_name webshaped.de www.webshaped.de _;
    absolute_redirect off;

    if ($canonical_host != "") {
        return 301 $redirect_scheme://$canonical_host$request_uri;
    }

    if ($legacy_post_slug != "") {
        return 301 /de/posts/$legacy_post_slug$is_args$args;
    }

    location / {
        proxy_pass http://app:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
